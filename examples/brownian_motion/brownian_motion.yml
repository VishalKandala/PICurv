# ==============================================================================
#  BROWNIAN MOTION VERIFICATION TEST CASE
#  case.yml
#
#  PURPOSE:
#  Verify pure Brownian particle diffusion against the Einstein relation:
#
#    MSD(t) = 6 * Gamma_eff * t          (3D, isotropic)
#
#  where Gamma_eff = nu / Sc = (1/Re) / Sc
#
#  PARAMETER CHOICES (justified below):
#
#  L_ref = 1.0 m, U_ref = 1.0 m/s  --> T_ref = 1.0 s
#  rho   = 1.0 kg/m^3, mu = 0.001 Pa.s  --> Re = rho*U*L/mu = 1000
#  Sc    = 1.0  (current solver default in src/setup.c unless overridden)
#  --> Gamma_eff (non-dim) = 1 / (Re * Sc) = 1/1000 = 1e-3
#
#  dt_phys = 0.001 s  --> dt* = 0.001
#  N_steps = 2000     --> t_final* = 2.0
#
#  Expected MSD at t* = 2.0:
#    MSD* = 6 * 1e-3 * 2.0 = 0.012
#
#  Max particle spread (3 sigma from center):
#    sigma_step = sqrt(2 * 1e-3 * 0.001) = 1.414e-3
#    3 * sigma_step * sqrt(2000) = 3 * 1.414e-3 * 44.7 ~= 0.19
#    Point source at (0.5, 0.5, 0.5) --> particles stay in [0.31, 0.69]
#    Safe inside [0, 1]^3 even with WALL BCs on every face.
#
#  NOTE: WALL boundaries are acceptable here because the particle cloud remains
#        far from every boundary over the default run, so removal losses are
#        negligibly unlikely.
#  NOTE: Uniform Cartesian grid ensures Gamma is spatially uniform,
#        so the drift correction term (grad Gamma = 0) vanishes exactly.
# ==============================================================================

properties:
  scaling:
    length_ref: 1.0         # meters
    velocity_ref: 1.0       # m/s; T_ref = L_ref/U_ref = 1.0 s
  fluid:
    density: 1.0            # kg/m^3
    viscosity: 0.001        # Pa.s  --> Re = rho*U*L/mu = 1000
  initial_conditions:
    mode: "Zero"            # Zero velocity everywhere (analytical mode overrides anyway)

run_control:
  start_step: 0
  total_steps: 2000         # t_final* = 2000 * 0.001 = 2.0
  dt_physical: 0.001        # dt* = dt_phys / T_ref = 0.001

grid:
  mode: programmatic_c
  programmatic_settings:
    # Uniform Cartesian 32^3-cell grid.
    # pic.flow converts these cell counts into 33^3 node counts for the C runtime.
    # Resolution chosen so grid cells are large enough (Δx = 1/32 ≈ 0.031)
    # that many particles occupy each cell for stable MSD bin statistics,
    # but fine enough that the uniform-Gamma assumption holds cleanly.
    im: 32
    jm: 32
    km: 32
    xMins: 0.0
    xMaxs: 1.0
    yMins: 0.0
    yMaxs: 1.0
    zMins: 0.0
    zMaxs: 1.0
    rxs: 1.0                # No stretching (uniform) -- ensures grad(Gamma) = 0 exactly
    rys: 1.0
    rzs: 1.0
    cgrids: 0               # Cartesian (not curvilinear)

models:
  domain:
    blocks: 1

  physics:
    turbulence:
      # Disable LES so nu_t = 0 and Gamma_eff = nu/Sc exactly.
      # If les: true, Smagorinsky would add a spatially varying nu_t
      # that contaminates Gamma_eff and invalidates the Einstein comparison.
      les: false

    particles:
      count: 50000          # Large ensemble for low MSD statistical noise.
                            # Expected noise ~ 1/sqrt(N) ~ 0.45% -- acceptable.
      init_mode: "PointSource"
      restart_mode: "init"
      point_source:
        x: 0.5             # Domain center -- 8 sigma from every wall at t*=2.0
        y: 0.5             # (sigma = sqrt(2*Gamma_eff*t) = 0.063, 3sigma = 0.19)
        z: 0.5             # Probability of any particle reaching a wall ~ 10^-15.

# WALL BCs on all faces.
# Particles are removed if they reach a wall, but with the source at (0.5,0.5,0.5)
# and Gamma_eff = 1e-3, the particle cloud spreads only ~0.19 in 3sigma by t*=2.0.
# The domain half-width is 0.5, so walls are ~8sigma away -- expected losses ~ 0.
# Periodic BCs are not used because they do not wrap particles in the current solver.
# ZERO_FLOW analytical mode means the no-slip condition is trivially satisfied
# (Eulerian velocity is zero everywhere by construction).
boundary_conditions:
  - face: "-Xi"
    type: WALL
    handler: noslip
  - face: "+Xi"
    type: WALL
    handler: noslip
  - face: "-Eta"
    type: WALL
    handler: noslip
  - face: "+Eta"
    type: WALL
    handler: noslip
  - face: "-Zeta"
    type: WALL
    handler: noslip
  - face: "+Zeta"
    type: WALL
    handler: noslip
