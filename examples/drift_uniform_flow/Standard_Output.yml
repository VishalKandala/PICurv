io:
  data_output_frequency: 100
  particle_console_output_frequency: 100
  particle_log_interval: 100

  directories:
    output: "output"
    restart: "restart"
    log: "logs"
    eulerian_subdir: "eulerian"
    particle_subdir: "particles"

logging:
  verbosity: "WARNING"
  enabled_functions: []

profiling:
  timestep_output:
    mode: "off"

solver_monitoring:
  -ksp_monitor: false
  -ksp_converged_reason: false
