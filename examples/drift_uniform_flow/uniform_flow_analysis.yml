run_control:
  start_step: 0
  end_step: 1000
  step_interval: 100

eulerian_pipeline:
  - task: nodal_average
    input_field: Ucat
    output_field: Ucat_nodal

io:
  output_directory: "viz"
  output_filename_prefix: "Field"
  particle_filename_prefix: "Particle"
  input_extensions:
    eulerian: "dat"
    particle: "dat"
  eulerian_fields:
    - Ucat_nodal
  output_particles: true

statistics_pipeline:
  output_prefix: "UniformFlowDrift"
  tasks:
    - task: msd
