io:
  data_output_frequency: 1
  particle_console_output_frequency: 1
  particle_log_interval: 256

  directories:
    output: "output"
    restart: "restart"
    log: "logs"
    eulerian_subdir: "eulerian"
    particle_subdir: "particles"

logging:
  # scatter_metrics.csv is always written when scalar verification is active.
  # This whitelist entry only controls the optional console summary.
  verbosity: "INFO"
  enabled_functions:
    - "LOG_SCATTER_METRICS"

profiling:
  timestep_output:
    mode: "off"

solver_monitoring:
  -ksp_monitor: false
  -ksp_converged_reason: false
