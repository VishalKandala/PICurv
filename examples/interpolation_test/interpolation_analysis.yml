# ==============================================================================
#  INTERPOLATION ACCURACY TEST CASE
#  post.yml
#
#  Primary output: particle VTP files with position, velocity, and pid fields.
#  These can be compared against exact TGV3D analytical velocities to quantify
#  interpolation error (L2 norm, Linf norm, per-component statistics).
#
#  The analytical reference velocity at particle position (x,y,z) at time t is:
#    u_exact =  sin(x)*cos(y)*cos(z) * exp(-2*nu*t)
#    v_exact = -cos(x)*sin(y)*cos(z) * exp(-2*nu*t)
#    w_exact =  0
#  where nu = 1/Re = 0.01.
# ==============================================================================

source_data:
  directory: "<solver_output_dir>"

run_control:
  start_step: 0
  end_step: 200
  step_interval: 10          # Match data_output_frequency from monitor

global_operations:
  dimensionalize: true

# Eulerian pipeline: minimal. Include nodal average for optional ParaView
# inspection of the analytical field.
eulerian_pipeline:
  - task: nodal_average
    input_field: Ucat
    output_field: Ucat_nodal

io:
  output_directory: "viz"
  output_filename_prefix: "Field"
  particle_filename_prefix: "Particle"
  eulerian_fields:
    - Ucat_nodal
  eulerian_fields_averaged: []
  output_particles: true
  particle_fields:
    - 'position'
    - 'velocity'
    - 'pid'
  particle_subsampling_frequency: 1
  input_extensions:
    eulerian: "dat"
    particle: "dat"
