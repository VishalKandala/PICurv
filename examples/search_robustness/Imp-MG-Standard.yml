# ==============================================================================
#  SEARCH ROBUSTNESS CURVILINEAR SOLVER PROFILE
# ==============================================================================

operation_mode:
  eulerian_field_source: "solve"

strategy:
  momentum_solver: "Dual Time Picard RK4"
tolerances:
  max_iterations: 50
  absolute_tol: 1.0e-8
  relative_tol: 1.0e-3
  step_tol: 1.0e-8

momentum_solver:
  dual_time_picard_rk4:
    pseudo_cfl:
      initial: 0.1
      minimum: 0.001
      maximum: 1.0
      growth_factor: 1.0
      reduction_factor: 1.0

poisson_solver:
  method: "fgmres"
  absolute_tolerance: 1.0e-5
  relative_tolerance: 1.0e-11
  max_iterations: 50
  gmres:
    restart: 20
  preconditioner:
    type: "multigrid"
  multigrid:
    levels: 3
    semi_coarsening:
      i: false
      j: false
      k: true
    level_solvers:
      level_0:
        method: "fgmres"
        preconditioner: "bjacobi"
      level_1:
        method: "richardson"
        preconditioner: "bjacobi"
      level_2:
        method: "richardson"
        preconditioner: "bjacobi"

petsc_passthrough_options: {}
