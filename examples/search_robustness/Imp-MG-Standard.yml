# ==============================================================================
#  SEARCH ROBUSTNESS CURVILINEAR SOLVER PROFILE
# ==============================================================================

operation_mode:
  eulerian_field_source: "solve"

strategy:
  momentum_solver: "Dual Time Picard Jameson RK"
tolerances:
  max_iterations: 50
  absolute_tol: 1.0e-8
  relative_tol: 1.0e-3
  residual_absolute_tol: 0.0
  residual_relative_tol: 1.0e-3

momentum_solver:
  dual_time_picard_jameson_rk:
    pseudo_cfl:
      initial: 0.5   # dimensionless Courant number: cfl_eff = dtau * lambda_max; stable range ~0-2.83
      minimum: 0.001
      maximum: 2.0   # 4-stage Jameson RK stability limit is ~2.83; 2.0 gives a comfortable margin
      growth_factor: 1.1
      reduction_factor: 0.75

poisson_solver:
  method: "fgmres"
  absolute_tolerance: 1.0e-5
  relative_tolerance: 1.0e-11
  max_iterations: 50
  gmres:
    restart: 20
  preconditioner:
    type: "multigrid"
  multigrid:
    levels: 3
    pre_sweeps: 2
    post_sweeps: 2
    cycle: "v"
    mode: "multiplicative"
    semi_coarsening:
      i: false
      j: false
      k: true
    level_solvers:
      level_0:
        method: "fgmres"
        preconditioner: "bjacobi"
      level_1:
        method: "richardson"
        preconditioner: "bjacobi"
      level_2:
        method: "richardson"
        preconditioner: "bjacobi"

petsc_passthrough_options: {}
