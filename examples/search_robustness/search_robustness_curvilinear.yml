# ==============================================================================
#  SEARCH ROBUSTNESS CHARACTERIZATION: CURVILINEAR LOCALIZED STRESS
# ==============================================================================

properties:
  scaling:
    length_ref: 1.0
    velocity_ref: 1.0
  fluid:
    density: 1.0
    viscosity: 0.001
  initial_conditions:
    mode: "Zero"

run_control:
  start_step: 0
  total_steps: 60
  dt_physical: 0.01

grid:
  mode: file
  da_processors_x: 2
  da_processors_y: 1
  da_processors_z: 1
  source_file: "bent_channel_coarse.picgrid"

models:
  domain:
    blocks: 1

  physics:
    turbulence:
      les: false

    particles:
      count: 20000
      init_mode: "PointSource"
      restart_mode: "init"
      point_source:
        # Physical image of the logical center node (i,j,k)=(10,10,72).
        # With the documented 2x1x1 decomposition this lies on the x-rank interface.
        x: 12.8284271
        y: 2.17157288
        z: 1.0

boundary_conditions:
  - face: "-Xi"
    type: WALL
    handler: noslip
  - face: "+Xi"
    type: WALL
    handler: noslip
  - face: "-Eta"
    type: WALL
    handler: noslip
  - face: "+Eta"
    type: WALL
    handler: noslip
  - face: "-Zeta"
    type: WALL
    handler: noslip
  - face: "+Zeta"
    type: WALL
    handler: noslip
