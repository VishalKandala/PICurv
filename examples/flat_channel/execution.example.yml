default_execution:
  # Rename/copy this file to `.picurv-execution.yml` to activate shared site
  # launcher defaults in this repo or case tree.
  launcher: "mpirun"
  launcher_args:
    - -mca
    - pml
    - ucx
    - -mca
    - btl
    - ^uct,ofi
    - -mca
    - mtl
    - ^ofi

local_execution: {}
cluster_execution: {}
