# Numerical profile for the serial constant-uniform-flow periodic smoke test.

operation_mode:
  eulerian_field_source: "solve"

strategy:
  momentum_solver: "Dual Time Picard Jameson RK"
  central_diff: false

tolerances:
  max_iterations: 20
  absolute_tol: 1.0e-10
  relative_tol: 1.0e-8
  residual_absolute_tol: 0.0
  residual_relative_tol: 1.0e-6

momentum_solver:
  dual_time_picard_jameson_rk:
    max_pseudo_steps: 20
    absolute_tol: 1.0e-10
    relative_tol: 1.0e-8
    pseudo_cfl:
      initial: 0.1
      minimum: 0.001
      maximum: 1.0
      growth_factor: 1.05
      reduction_factor: 0.75

poisson_solver:
  method: "fgmres"
  absolute_tolerance: 1.0e-10
  relative_tolerance: 1.0e-12
  max_iterations: 50
  gmres:
    restart: 20
  preconditioner:
    type: "multigrid"
  multigrid:
    levels: 3
    pre_sweeps: 2
    post_sweeps: 2
    cycle: "v"
    mode: "multiplicative"
    semi_coarsening:
      i: false
      j: false
      k: false
    level_solvers:
      level_0:
        method: "fgmres"
        preconditioner: "bjacobi"
      level_1:
        method: "richardson"
        preconditioner: "bjacobi"
      level_2:
        method: "richardson"
        preconditioner: "bjacobi"

petsc_passthrough_options: {}
