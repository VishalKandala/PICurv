# ==============================================================================
#                 PICurv Master Cluster Configuration (Slurm v1)
# ==============================================================================
#
# This file defines scheduler/resource settings used by:
#   picurv run   --cluster cluster.yml ...
#   picurv sweep --cluster cluster.yml ...
#
# In v1, scheduler.type must be "slurm".
# Run IDs are not configured here; picurv derives them from
# <case_basename>_<timestamp> and uses that to name scheduler jobs.
# ==============================================================================

scheduler:
  type: slurm

resources:
  # These resources size solver-stage jobs.
  # picurv currently schedules post stage as single-task by default.
  account: "my_project_account"
  partition: "compute"        # optional
  nodes: 2
  ntasks_per_node: 32
  mem: "128G"
  time: "02:00:00"

notifications:
  mail_user: "user@example.edu"  # optional, validated when set
  mail_type: "END,FAIL"          # optional

execution:
  # Shell lines injected before launch command.
  module_setup:
    - "module purge"
    - "module restore petsc-setup"

  # Launcher and args are batch-specific overrides.
  # If your site uses the same launcher tokens for login-node and batch runs,
  # put them in `.picurv-execution.yml` and only override them here when needed.
  # Removing these keys lets batch jobs inherit from `.picurv-execution.yml`.
  launcher: "srun"               # alternatives: "mpirun", custom launcher
  launcher_args: []              # e.g. ["--cpu-bind=cores"] or ["-mca", "pml", "ucx"]
  # Multi-word launcher strings are accepted, but the portable form is:
  # launcher: "mpirun"
  # launcher_args: ["-mca", "pml", "ucx"]

  # Optional pass-through SBATCH flags.
  # dict form:
  # extra_sbatch:
  #   qos: "high"
  #   constraint: "zen4"
  # list form:
  # extra_sbatch:
  #   - "--qos=high"
  #   - "--constraint=zen4"
