# ==============================================================================
#                 PICurv Master Study Configuration (Sweep)
# ==============================================================================
#
# Used by:
#   picurv sweep --study study.yml --cluster cluster.yml
#
# Parameter keys must use:
#   <target>.<yaml.path>
# where target is one of: case, solver, monitor, post
# ==============================================================================

base_configs:
  case: "../flat_channel/flat_channel.yml"
  solver: "../flat_channel/Imp-MG-Standard.yml"
  monitor: "../flat_channel/Standard_Output.yml"
  post: "../flat_channel/standard_analysis.yml"

study_type: "grid_independence"   # grid_independence | timestep_independence | sensitivity

parameters:
  case.grid.programmatic_settings.im: [32, 48, 64]
  case.grid.programmatic_settings.jm: [32, 48, 64]
  case.grid.programmatic_settings.km: [64, 96, 128]

# Multi-field group sweep: map a parent key to a list of dicts in parameters:
# to sweep multiple related sub-fields together (as a unit, not a cartesian
# product with each other). Cartesian products are still formed against OTHER
# parameters or groups.
#
# Example: sweep dt + total_steps as coupled pairs across two grid resolutions:
#   parameters:
#     case.grid.programmatic_settings.im: [32, 64]
#     case.run_control:
#       - {start_step: 0, total_steps: 400, dt_physical: 0.005}
#       - {start_step: 0, total_steps: 800, dt_physical: 0.0025}
#
# This produces 4 combinations (2 grid × 2 run_control groups), not 8.

# For coupled overrides that should move together instead of forming a cartesian
# product, use parameter_sets instead of parameters. Provide exactly one of the
# two blocks.
# parameter_sets:
#   - case.grid.programmatic_settings.im: 32
#     case.grid.programmatic_settings.jm: 32
#     case.grid.programmatic_settings.km: 64
#     case.models.physics.particles.count: 50000
#   - case.grid.programmatic_settings.im: 64
#     case.grid.programmatic_settings.jm: 64
#     case.grid.programmatic_settings.km: 128
#     case.models.physics.particles.count: 400000

metrics:
  # String shorthand:
  - msd_final

  # Explicit form examples:
  # - name: final_msd
  #   source: statistics_csv
  #   file_glob: "**/*_msd.csv"
  #   column: "msd"
  #   reduction: "last"     # Options: "last" | "min" | "max" | "mean" | "p95"
  #
  # - name: residual_floor
  #   source: log_regex
  #   file_glob: "logs/*solver*.log"
  #   regex: "Final residual\\s*=\\s*([0-9.eE+-]+)"
  #   reduction: "last"
  #
  # --- Derived / normalized metric forms ---
  #
  # Normalize a raw column value by one of the sweep parameters.
  # Useful for grid-convergence error norms (e.g., L2_error / h^2):
  # - name: msd_per_dt
  #   source: statistics_csv
  #   file_glob: "**/*_msd.csv"
  #   column: "msd"
  #   reduction: "last"
  #   normalize_by_parameter: "case.run_control.dt_physical"  # Divide result by this parameter value.
  #
  # Compute a ratio of two columns from the same CSV (e.g., signal-to-noise):
  # - name: signal_noise_ratio
  #   source: statistics_csv
  #   file_glob: "**/*_msd.csv"
  #   numerator_column: "msd"
  #   denominator_column: "msd_variance"
  #   denominator_floor: 1.0e-12    # Clamp denominator to avoid division by zero.
  #   reduction: "last"

plotting:
  enabled: true
  output_format: "png"            # png | pdf | svg

execution:
  # Optional max number of active array tasks at once.
  # If omitted, Slurm uses full array width.
  max_concurrent_array_tasks: 8
