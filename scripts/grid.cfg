# ===================================================================
# Grid Generator Configuration File
#
# The first section determines the default grid type.
# All other sections provide default parameters if that type is chosen.
# ===================================================================

[cpipe]
# --- Grid Type: Cartesian Pipe (Recommended) ---
# i, j are cross-section; k is along the path

# Discretization
ncells_i = 64
ncells_j = 64
ncells_k = 280

# Stretching Options (can combine both methods):
# Option 1: Hyperbolic tangent stretching only (factor-based, smooth distribution)
#stretch_i = 1.2
#stretch_j = 1.2
# stretch_k = 0.0

# Option 2: First cell dimension only (geometric progression)
#first_cell_i_start = 0.001
#first_cell_j_start = 0.001
#first_cell_i_end = 0.001
#first_cell_j_end = 0.001

# Option 3: Combined (recommended) - smooth tanh with exact first cell size
# When both stretch_i and first_cell_i are specified, the code auto-computes
# the optimal stretch factor to achieve the desired first cell size while
# maintaining smooth tanh clustering (expansion ratio typically < 1.5).
# The stretch_i value serves as an initial guess (can be any value > 0).
stretch_i = 1.1
stretch_j = 1.1
first_cell_i_start = 0.01
first_cell_j_start = 0.01
# Optional: specify end cell size for symmetric stretching
first_cell_i_end = 0.01
first_cell_j_end = 0.01

# Geometry
side_lengths    = 1.0 1.0   # Two values for a rectangular cross-section (i j)
rc_factor       = 2.3
straight_factor = 5.0
bend_angle      = 90.0      # Bend angle in degrees
orientation     = xy        # Bend plane: 'xy' or 'xz'
origin          = 5.0 0.5 0.5 # Global offset for the entire grid (x y z)

# Outputs
vts    = brownian_grids/brownian_medium.vts
output = brownian_grids/brownian_medium.grid
show_stats  = yes
stats_file  = brownian_grids/brownian_medium.info
write_vtk   = yes

# ===================================================================

[pipe]
# --- Grid Type: O-Grid Pipe ---
# i (phi) and j (r) are cross-section; k is along the path

# Discretization
ncells_phi  = 30
ncells_r    = 15
ncells_path = 120

# Stretching Options
# stretch_i = 0.0  # Note: i-direction (circumferential) stretching is ignored for O-grids
# stretch_j = 0.0  # Radial stretching
# stretch_k = 0.0  # Streamwise stretching
# first_cell_j_start = 0.001  # First cell at pipe center (radial)
# first_cell_j_end = 0.001    # First cell at pipe wall (radial)

# Geometry
diameter        = 1.0
rc_factor       = 2.0
straight_factor = 5.0
bend_angle      = 120.0
pinhole_factor  = 0.05
orientation     = xz
origin          = 0.0 0.0 0.0

# Outputs
vts    = pipe_from_config.vts
output =
show_stats  = yes
stats_file  =
write_vtk   = yes

# ===================================================================

[warp]
# --- Grid Type: Warped Box ---

# Discretization
ncells_i = 20
ncells_j = 20
ncells_k = 20

# Stretching Options
# stretch_i = 0.0
# stretch_j = 0.0
# stretch_k = 0.0
# first_cell_i_start = 0.001
# first_cell_j_start = 0.001
# first_cell_k_start = 0.001

# Geometry
bounds_x = 0.0 1.0
bounds_y = 0.0 1.0
bounds_z = 0.0 1.0
amp_A = 0.1
amp_B = 0.05
amp_C = 0.05
origin = 0 0 0

# Outputs
vts = brownian.vts
output =
show_stats = yes
stats_file =
write_vtk = yes
