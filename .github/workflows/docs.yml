name: Build & Mirror Doxygen

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Doxygen & Graphviz
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz
      - name: Generate Doxygen
        working-directory: docs
        run: doxygen Doxyfile
      - name: Verify and patch key Doxygen index pages
        run: |
          test -f docs/docs_build/html/index.html
          test -f docs/docs_build/html/pages.html
          if [ ! -f docs/docs_build/html/files.html ]; then
            echo "::warning::Doxygen did not generate files.html; creating fallback page."
            cat > docs/docs_build/html/files.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1" />
            <title>PICurv File List</title>
            <link href="doxygen.css" rel="stylesheet" />
          </head>
          <body>
            <div class="header"><div class="title">File List</div></div>
            <div class="contents">
              <p>Detailed file index was not generated in this build.</p>
              <p>Use <a href="pages.html">Documentation</a> and <a href="index.html">Home</a> for navigation.</p>
            </div>
          </body>
          </html>
          EOF
          fi
          if [ ! -f docs/docs_build/html/annotated.html ]; then
            echo "::warning::Doxygen did not generate annotated.html; creating fallback page."
            cat > docs/docs_build/html/annotated.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1" />
            <title>PICurv Data Structures</title>
            <link href="doxygen.css" rel="stylesheet" />
          </head>
          <body>
            <div class="header"><div class="title">Data Structures</div></div>
            <div class="contents">
              <p>Detailed structure index was not generated in this build.</p>
              <p>Use <a href="pages.html">Documentation</a> and <a href="index.html">Home</a> for navigation.</p>
            </div>
          </body>
          </html>
          EOF
          fi
      - name: Upload build artifact (for mirroring)
        uses: actions/upload-artifact@v4
        with:
          name: doxygen-html
          path: docs/docs_build/html

  mirror-to-website:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout website repo
        uses: actions/checkout@v4
        with:
          repository: VishalKandala/VishalKandala.github.io
          token: ${{ secrets.WEBSITE_PUSH_TOKEN }}
          path: site

      - name: Download built docs artifact
        uses: actions/download-artifact@v4
        with:
          name: doxygen-html
          path: built-docs

      - name: Sync docs into website repo
        run: |
          rm -rf site/docs/picurv
          mkdir -p site/docs/picurv
          cp -R built-docs/* site/docs/picurv/
          touch site/docs/picurv/.nojekyll

          # Backward-compatibility shim for old /docs/pic_dev links.
          rm -rf site/docs/pic_dev
          mkdir -p site/docs/pic_dev
          cat > site/docs/pic_dev/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8" />
            <meta http-equiv="refresh" content="0; url=/docs/picurv/index.html" />
            <meta name="viewport" content="width=device-width, initial-scale=1" />
            <title>Redirecting to /docs/picurv/</title>
          </head>
          <body>
            <p>Redirecting to <a href="/docs/picurv/index.html">/docs/picurv/index.html</a>...</p>
          </body>
          </html>
          EOF
          touch site/docs/pic_dev/.nojekyll

          mkdir -p site/_pages
          if [ ! -f site/_pages/picurv-docs.md ]; then
            cat > site/_pages/picurv-docs.md << 'EOF'
          ---
          layout: page
          title: PICurv Docs
          permalink: /picurv-docs/
          nav: true
          nav_order: 8
          description: PICurv solver documentation (Doxygen)
          ---

          <iframe src="{{ '/docs/picurv/index.html' | relative_url }}"
                  style="width: 100%; min-height: 82vh; border: 0;"
                  loading="lazy"
                  title="PICurv Doxygen Documentation">
          </iframe>

          If the embedded view does not load, open the standalone docs:
          [PICurv Doxygen Documentation]({{ '/docs/picurv/index.html' | relative_url }}).
          EOF
          fi

      - name: Commit & push
        working-directory: site
        run: |
          git config user.name  "gh-actions"
          git config user.email "actions@github.com"
          git add docs/picurv docs/pic_dev _pages/picurv-docs.md
          git commit -m "Update PIC Dev Doxygen docs" || echo "No changes to commit"
          git push origin HEAD:master || git push origin HEAD:main
