name: Build & Mirror Doxygen

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Doxygen & Graphviz
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz
      - name: Generate Doxygen
        run: doxygen docs/Doxyfile
      - name: Verify and patch key Doxygen index pages
        run: |
          test -f docs_build/html/index.html
          test -f docs_build/html/pages.html
          python3 scripts/generate_doxygen_fallback_indexes.py \
            --repo-root . \
            --html-dir docs_build/html

          cp docs/theme-sync.js docs_build/html/theme-sync.js
          for f in docs_build/html/*.html docs_build/html/search/*.html; do
            [ -f "$f" ] || continue
            case "$f" in
              */search/*) sync_path="../theme-sync.js" ;;
              *) sync_path="theme-sync.js" ;;
            esac
            if ! grep -q "theme-sync.js" "$f"; then
              sed -i "s#</head>#<script type=\"text/javascript\" src=\"${sync_path}\"></script>\n</head>#g" "$f"
            fi
          done
      - name: Upload build artifact (for mirroring)
        uses: actions/upload-artifact@v4
        with:
          name: doxygen-html
          path: docs_build/html

  mirror-to-website:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout website repo
        uses: actions/checkout@v4
        with:
          repository: VishalKandala/VishalKandala.github.io
          token: ${{ secrets.WEBSITE_PUSH_TOKEN }}
          path: site

      - name: Download built docs artifact
        uses: actions/download-artifact@v4
        with:
          name: doxygen-html
          path: built-docs

      - name: Sync docs into website repo
        run: |
          rm -rf site/docs/picurv
          mkdir -p site/docs/picurv
          cp -R built-docs/* site/docs/picurv/
          touch site/docs/picurv/.nojekyll

          # Backward-compatibility shim for old /docs/pic_dev links.
          rm -rf site/docs/pic_dev
          mkdir -p site/docs/pic_dev
          cat > site/docs/pic_dev/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8" />
            <meta http-equiv="refresh" content="0; url=/docs/picurv/index.html" />
            <meta name="viewport" content="width=device-width, initial-scale=1" />
            <title>Redirecting to /docs/picurv/</title>
          </head>
          <body>
            <p>Redirecting to <a href="/docs/picurv/index.html">/docs/picurv/index.html</a>...</p>
          </body>
          </html>
          EOF
          touch site/docs/pic_dev/.nojekyll

          mkdir -p site/_pages
          if [ ! -f site/_pages/picurv-docs.md ]; then
            cat > site/_pages/picurv-docs.md << 'EOF'
          ---
          layout: none
          title: PICurv Docs
          permalink: /picurv-docs/
          nav: true
          nav_order: 3
          description: PICurv solver documentation (Doxygen)
          ---

          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1" />
            <meta http-equiv="refresh" content="0; url={{ '/docs/picurv/index.html' | relative_url }}" />
            <title>Redirecting to PICurv Docs</title>
            <script>
              window.location.replace("{{ '/docs/picurv/index.html' | relative_url }}");
            </script>
          </head>
          <body>
            <p>Redirecting to <a href="{{ '/docs/picurv/index.html' | relative_url }}">PICurv documentation</a>...</p>
          </body>
          </html>
          EOF
          fi

      - name: Commit & push
        working-directory: site
        run: |
          git config user.name  "gh-actions"
          git config user.email "actions@github.com"
          git add docs/picurv docs/pic_dev _pages/picurv-docs.md
          git commit -m "Update PICurv Doxygen docs" || echo "No changes to commit"
          git push origin HEAD:master || git push origin HEAD:main
