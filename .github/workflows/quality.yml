name: CLI and Docs Quality

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pyyaml numpy

      - name: Run CLI and config smoke tests
        run: pytest -q

      - name: Check markdown links (README + docs + examples)
        run: python scripts/check_markdown_links.py
