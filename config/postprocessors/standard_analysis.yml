# ==========================================================
#         Post-Processing Profile: Standard Analysis
# ==========================================================
# Purpose:
# Baseline visualization recipe for Eulerian output.
# Optional particle/statistics sections are included as commented examples.
# ==========================================================

run_control:
  # Process all available timesteps by default.
  # Keep this as the full logical window for the recipe.
  # With `picurv run --post-process --continue`, PICurv computes the
  # effective restart step internally for the same recipe lineage.
  start_step: 0
  end_step: -1
  step_interval: 1

source_data:
  # Recommended placeholder: resolved by picurv to this run's solver output.
  directory: "<solver_output_dir>"

global_operations:
  dimensionalize: true

eulerian_pipeline:
  - task: q_criterion

  - task: nodal_average
    input_field: 'P'
    output_field: 'P_nodal'

  - task: nodal_average
    input_field: 'Ucat'
    output_field: 'Ucat_nodal'

  - task: normalize_field
    field: 'P'
    reference_point: [1, 1, 1]

# Optional particle-derived fields (enable only if particle data exists).
# lagrangian_pipeline:
#   - task: specific_ke
#     input_field: 'velocity'
#     output_field: 'specific_ke'

# Optional statistics pipeline (currently supports MSD).
# statistics_pipeline:
#   output_prefix: "Stats"
#   tasks:
#     - task: msd

io:
  output_directory: "viz"
  output_filename_prefix: "Field"
  particle_filename_prefix: "Particle"

  eulerian_fields:
    - 'Ucat_nodal'
    - 'P_nodal'
    - 'Qcrit'

  # Reserved passthrough (currently no-op in writer path).
  eulerian_fields_averaged: []

  # Keep false for Eulerian-only postprocessing.
  output_particles: false
  particle_fields: []
  particle_subsampling_frequency: 1

  # Post input file extensions (without leading dot preferred).
  input_extensions:
    eulerian: "dat"
    particle: "dat"
