# ==============================================================================
#                 Solver Profile: Implicit Multigrid (impRK) Standard
# ==============================================================================
# PURPOSE:
# A standard, robust solver configuration using an implicit time-stepping
# scheme preconditioned with a geometric multigrid solver. Suitable for a wide
# range of incompressible flow problems.
# ==============================================================================

# --- Solver Operation Mode ---
operation_mode:
  eulerian_field_source: "solve"

# --- Primary Solver Strategy & Tolerances ---
strategy:
  momentum_solver: "Dual Time Picard Jameson RK"
tolerances:
  max_iterations: 50
  absolute_tol: 1.0e-8
  relative_tol: 1.0e-3
  residual_absolute_tol: 0.0
  residual_relative_tol: 1.0e-3

momentum_solver:
  dual_time_picard_jameson_rk:
    pseudo_cfl:
      initial: 0.1
      minimum: 0.001
      maximum: 1.0
      growth_factor: 1.05
      reduction_factor: 0.75

# --- Poisson Solver Configuration (pressure-correction Phi) ---
poisson_solver:
  method: "fgmres"
  absolute_tolerance: 1.0e-5
  relative_tolerance: 1.0e-11
  max_iterations: 50
  gmres:
    restart: 20
  preconditioner:
    type: "multigrid"
  multigrid:
    levels: 3
    pre_sweeps: 2
    post_sweeps: 2
    cycle: "v"
    mode: "multiplicative"
    # Use semi-coarsening in the 'k' direction, assuming it's the longest.
    semi_coarsening:
      i: false  # -> -mg_i_semi 0
      j: false  # -> -mg_j_semi 0
      k: true   # -> -mg_k_semi 1
    level_solvers:
      level_0:
        method: "fgmres"      # Coarsest level
        preconditioner: "bjacobi"
      level_1:
        method: "richardson"
        preconditioner: "bjacobi"
      level_2:
        method: "richardson"  # Finest level
        preconditioner: "bjacobi"
      
# --- Scalar Transport (optional) ---
# Uncomment to override solver defaults for diffusivity/Brownian calculations.
# scalar_transport:
#   schmidt_number: 1.0              # -> -schmidt_number  (default 1.0)
#   turbulent_schmidt_number: 0.7    # -> -turb_schmidt_number  (default 0.7)

# --- Physical Solution Convergence Logging (optional) ---
# Writes logs/solution_convergence.csv each step; does not alter solver stopping.
# Uncomment and set mode to activate non-default tracking.
# solution_convergence:
#   mode: "steady_deterministic"   # steady_deterministic | periodic_deterministic | statistical_steady
#   # periodic_deterministic:
#   #   period_steps: 200
#   # statistical_steady:
#   #   window_steps: 500

# --- PETSC PASSTHROUGH OPTIONS ---
# Advanced PETSc options not covered by structured YAML can still go here.
petsc_passthrough_options: {}
