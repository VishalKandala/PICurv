# PICurv expression-based initial-condition generator example.
#
# Expressions are evaluated on the actual nondimensional PICGRID geometry.
# For field: Ucat, define Cartesian velocity components u, v, and w.
# For field: Ucont, replace them with u_xi, u_eta, and u_zeta.

[expression]
u = sin(2*pi*x) * cos(2*pi*y) * cos(2*pi*z)
v = -cos(2*pi*x) * sin(2*pi*y) * cos(2*pi*z)
w = 0.0

# Optional controls:
# scale = 1.0
# zero_tolerance = 1.0e-14
# max_magnitude = 100.0
