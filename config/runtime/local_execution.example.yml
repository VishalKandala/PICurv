local_execution:
  # Legacy local-only example.
  # Prefer config/runtime/execution.example.yml copied to `.picurv-execution.yml`
  # when you want one site config to cover both login-node and batch runs.
  # This file still works for local multi-rank launcher overrides only.
  launcher: "mpirun"
  launcher_args:
    - -mca
    - pml
    - ucx
    - -mca
    - btl
    - ^uct,ofi
    - -mca
    - mtl
    - ^ofi
