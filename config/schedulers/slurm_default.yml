scheduler:
  type: slurm

resources:
  account: "replace_with_account"
  partition: "compute"
  nodes: 1
  ntasks_per_node: 1
  mem: "16G"
  time: "01:00:00"

notifications:
  mail_user: null
  mail_type: null

execution:
  module_setup:
    - "module purge"
  launcher: "srun"
  launcher_args: []
  # Generated Slurm solver jobs enable these defaults even when omitted.
  # Uncomment to tune the runtime walltime estimator:
  # walltime_guard:
  #   enabled: true
  #   warmup_steps: 10
  #   multiplier: 2.0
  #   min_seconds: 60
  #   estimator_alpha: 0.35
  # Optional early warning before walltime. Example:
  # extra_sbatch:
  #   signal: "USR1@300"
  extra_sbatch: {}
