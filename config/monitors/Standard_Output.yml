# ==============================================================================
#                   Monitor Profile: Standard Output
# ==============================================================================
# PURPOSE:
# Production-safe default monitor profile with WARNING logging and regular I/O.
# The startup banner still reports key case metadata and walltime-guard status.
# ==============================================================================

logging:
  verbosity: WARNING
  enabled_functions: []

profiling:
  timestep_output:
    mode: "off"

diagnostics:
  petsc:
    malloc_debug: false
    malloc_test: false
    malloc_dump: false
    malloc_view: false
    malloc_view_threshold: null
    memory_view: false
    log_view: false
    log_view_memory: false
    log_all: false
    log_trace: false
    objects_dump: false
    options_left: null
  runtime_memory_log:
    enabled: true
    file: "Runtime_Memory.log"

io:
  data_output_frequency: 100
  particle_console_output_frequency: 100
  particle_log_interval: 100
  directories:
    output: "output"
    restart: "restart"
    log: "logs"
    eulerian_subdir: "eulerian"
    particle_subdir: "particles"

# Optional structured solver monitoring switches.
solver_monitoring:
  poisson:
    pic_true_residual: false
    converged_reason: false
