# ==============================================================================
#                   Monitor Profile: Standard Output
# ==============================================================================
# PURPOSE:
# Production-safe default monitor profile with INFO logging and regular I/O.
# ==============================================================================

logging:
  verbosity: INFO
  enabled_functions: []

profiling:
  critical_functions:
    - AdvanceSimulation
    - Flow_Solver

io:
  data_output_frequency: 100
  particle_log_interval: 100
  directories:
    output: "results"
    restart: "results"
    log: "logs"
    eulerian_subdir: "eulerian"
    particle_subdir: "particles"

# Optional raw PETSc monitoring switches.
solver_monitoring:
  -ps_ksp_pic_monitor_true_residual: false
  -ps_ksp_converged_reason: false
