scheduler:
  type: slurm

resources:
  account: "test_account"
  partition: "compute"
  nodes: 1
  ntasks_per_node: 1
  mem: "4G"
  time: "00:10:00"

notifications:
  mail_user: null
  mail_type: null

execution:
  module_setup:
    - "module purge"
  launcher: "srun"
  launcher_args: []
  extra_sbatch: {}
