logging:
  verbosity: INFO
  enabled_functions: []

profiling:
  timestep_output:
    mode: selected
    functions:
      - AdvanceSimulation

diagnostics:
  petsc:
    malloc_debug: false
    malloc_test: false
    malloc_dump: false
    malloc_view: false
    malloc_view_threshold: null
    memory_view: false
    log_view: false
    log_view_memory: false
    log_all: false
    log_trace: false
    objects_dump: false
    options_left: null
  runtime_memory_log:
    enabled: true
    file: "Runtime_Memory.log"

io:
  data_output_frequency: 2
  particle_console_output_frequency: 2
  particle_log_interval: 2

solver_monitoring:
  momentum:
    newton_krylov_history: false
  poisson:
    pic_true_residual: false
    converged_reason: false
